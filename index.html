function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}
function circle(x,y,r,fill,stroke=null,lw=2){ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);if(fill){ctx.fillStyle=fill;ctx.fill()}if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lw;ctx.stroke()}}
function rect(x,y,w,h,fill,stroke=null,r=10){ctx.beginPath();ctx.roundRect(x,y,w,h,r);ctx.fillStyle=fill;ctx.fill();if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=2;ctx.stroke()}}
function text(t,x,y,s=20,c=C.white,a="left"){ctx.fillStyle=c;ctx.font=s+"px Arial";ctx.textAlign=a;ctx.textBaseline="middle";ctx.fillText(t,x,y)}
function button(x,y,w,h,label,color,s=20){rect(x,y,w,h,color,C.white,10);text(label,x+w/2,y+h/2,s,C.white,"center");return{x,y,w,h}}
function inside(p,r){return r&&p.x>=r.x&&p.x<=r.x+r.w&&p.y>=r.y&&p.y<=r.y+r.h}
function distSeg(p,a,b){let dx=b.x-a.x,dy=b.y-a.y,len=dx*dx+dy*dy;if(!len)return dist(p,a);let t=((p.x-a.x)*dx+(p.y-a.y)*dy)/len;t=Math.max(0,Math.min(1,t));return Math.hypot(p.x-(a.x+t*dx),p.y-(a.y+t*dy))}
function nearPath(p,path,m=56){for(let i=0;i<path.length-1;i++)if(distSeg(p,path[i],path[i+1])<m)return true;return false}

class Enemy{
 constructor(type,path,hpMul=1,spdMul=1){let s=ENEMIES[type];this.type=type;this.path=path;this.i=0;this.x=path[0].x;this.y=path[0].y;this.maxHp=s.hp*hpMul;this.hp=this.maxHp;this.speed=s.speed*spdMul;this.reward=s.reward;this.color=s.color;this.size=s.size;this.armor=s.armor;this.dead=false;this.reached=false;this.slowF=1;this.slowT=0;this.heal=90}
 update(enemies){if(this.dead||this.reached)return;if(this.slowT>0)this.slowT--;else this.slowF=1;if(this.type==="healer"&&--this.heal<=0){this.heal=90;for(let e of enemies)if(e!==this&&!e.dead&&!e.reached&&dist(this,e)<70)e.hp=Math.min(e.maxHp,e.hp+10)}if(this.i>=this.path.length-1){this.reached=true;return}let t=this.path[this.i+1],dx=t.x-this.x,dy=t.y-this.y,d=Math.hypot(dx,dy),sp=this.speed*this.slowF;if(d<=sp){this.x=t.x;this.y=t.y;this.i++}else{this.x+=dx/d*sp;this.y+=dy/d*sp}}
 damage(v,ignoreArmor=false){let armor=ignoreArmor?0:this.armor;this.hp-=Math.max(1,v*(1-armor));if(this.hp<=0)this.dead=true}
 slow(f,t){if(f<this.slowF){this.slowF=f;this.slowT=t}}
 rewind(){this.i=Math.max(0,this.i-1);let p=this.path[this.i];this.x=p.x;this.y=p.y}
 draw(){circle(this.x,this.y,this.size,this.color);if(this.type==="shield")circle(this.x,this.y,this.size+3,null,C.white,2);if(this.type==="boss")circle(this.x,this.y,8,C.red);let w=this.size*2.5,r=Math.max(0,this.hp/this.maxHp);ctx.fillStyle="#461414";ctx.fillRect(this.x-w/2,this.y-this.size-16,w,6);ctx.fillStyle=C.green;ctx.fillRect(this.x-w/2,this.y-this.size-16,w*r,6)}
}
class Projectile{
 constructor(x,y,target,dmg,color,speed=7,splash=0){this.x=x;this.y=y;this.t=target;this.dmg=dmg;this.color=color;this.speed=speed;this.splash=splash;this.dead=false}
 update(enemies){if(this.dead||this.t.dead||this.t.reached){this.dead=true;return}let dx=this.t.x-this.x,dy=this.t.y-this.y,d=Math.hypot(dx,dy);if(d<=this.speed){this.hit(enemies);this.dead=true}else{this.x+=dx/d*this.speed;this.y+=dy/d*this.speed}}
 hit(enemies){if(this.splash>0){for(let e of enemies)if(!e.dead&&!e.reached&&dist(this.t,e)<=this.splash)e.damage(this.dmg)}else this.t.damage(this.dmg)}
 draw(){circle(this.x,this.y,5,this.color)}
}
class Tower{
 constructor(x,y,type,mul=1,hard=false){let s=TOWERS[type];this.x=x;this.y=y;this.type=type;this.range=s.range;this.damage=s.damage*mul;this.cool=s.cooldown;this.cd=0;this.color=s.color;this.label=s.label;this.level=1;this.spec=null;if(type==="cannon"&&hard){this.damage*=.7;this.cool=Math.floor(this.cool*1.2);this.range*=.96}}
 upgradeCost(){return this.level>=4?null:Math.floor(42+this.level*38)}
 specCost(){return 220}
 sellValue(){let total=TOWERS[this.type].cost;for(let i=1;i<this.level;i++)total+=Math.floor(42+i*38);if(this.spec)total+=this.specCost();return Math.floor(total*.7)}
 upgrade(){if(this.level>=4)return false;this.level++;this.damage*=1.18;this.range+=6;this.cool=Math.max(18,Math.floor(this.cool*.95));return true}
 specialize(n){if(this.level<4||this.spec)return;let sp=["",""];if(this.type==="archer")sp=n===1?["sniper","Sniper"]:["multi","Multi"];if(this.type==="cannon")sp=n===1?["mega","Mega Canon"]:["fire","Canon Feu"];if(this.type==="time")sp=n===1?["stasis","Stase"]:["rewind","Retour"];if(this.type==="tesla")sp=n===1?["storm","Tempête"]:["overload","Surcharge"];if(this.type==="titan")sp=n===1?["execute","Exécution"]:["breaker","Brise-Titan"];this.spec=sp[0];this.label=sp[1];if(this.spec==="sniper"){this.damage*=2.1;this.range+=80;this.cool*=1.35}if(this.spec==="multi"){this.damage*=.75;this.cool=Math.max(12,this.cool*.55)}if(this.spec==="mega"){this.damage*=1.45;this.range+=15}if(this.spec==="fire"){this.damage*=1.25;this.cool=Math.max(18,this.cool*.82)}if(this.spec==="overload"){this.cool=Math.max(12,this.cool*.55);this.range*=.8}this.cool=Math.floor(this.cool)}
 update(enemies,projectiles){if(this.cd>0){this.cd--;return}let targets=enemies.filter(e=>!e.dead&&!e.reached&&dist(this,e)<=this.range).sort((a,b)=>b.i-a.i||dist(this,a)-dist(this,b));if(!targets.length)return;let chosen=this.spec==="multi"?targets.slice(0,3):[targets[0]];
  for(let target of chosen){
   if(this.type==="archer")projectiles.push(new Projectile(this.x,this.y,target,this.damage,C.green,8));
   if(this.type==="cannon")projectiles.push(new Projectile(this.x,this.y,target,this.damage,C.orange,5,this.spec==="mega"?75:45));
   if(this.type==="time"){target.damage(this.damage);target.slow(.45,160);if(this.spec==="stasis"&&Math.random()<.12)target.slow(.01,120);if(this.spec==="rewind"&&Math.random()<.1)target.rewind()}
   if(this.type==="tesla"){let jumps=this.spec==="storm"?8:4,cur=target,seen=[];for(let i=0;i<jumps;i++){if(!cur||cur.dead||cur.reached)break;cur.damage(this.damage);seen.push(cur);cur=enemies.filter(e=>!e.dead&&!e.reached&&!seen.includes(e)&&dist(cur,e)<=95).sort((a,b)=>dist(cur,a)-dist(cur,b))[0]}}
   if(this.type==="titan"){let dmg=Math.min(target.maxHp*.02,7000);if(this.spec==="breaker"){dmg*=target.type==="boss"?1.5:1.15;target.damage(dmg,true)}else target.damage(dmg);if(this.spec==="execute"&&target.hp<=target.maxHp*.1){target.hp=0;target.dead=true}}
  }
  this.cd=this.cool;
 }
 draw(sel){circle(this.x,this.y,20,this.color,C.black,2);if(this.spec)circle(this.x,this.y,25,null,C.yellow,3);if(sel){circle(this.x,this.y,this.range,null,C.white,1);circle(this.x,this.y,24,null,C.yellow,3)}if(this.type==="cannon")circle(this.x,this.y,8,C.black);if(this.type==="time")text("⏳",this.x,this.y+2,18,C.white,"center");if(this.type==="tesla")text("⚡",this.x,this.y+2,18,C.white,"center");if(this.type==="titan")text("T",this.x,this.y+2,18,C.white,"center")}
}

class Game{
 constructor(){this.state="menu";this.mode="normal";this.selectedBuild="archer";this.selectedTower=null;this.previewPad=null;this.placingPad=false;this.pendingPad=null;this.metaGold=0;this.bonusLife=0;this.bonusGold=0;this.bonusDamage=0;this.level=0;this.cycle=0;this.stage=0;this.inEndless=false;this.score=0;this.timer=0;this.spawnT=0;this.effects=[];this.scoreSubmitted=false;this.reset(true)}
 reset(full=false){if(full){this.level=0;this.inEndless=false;this.cycle=0;this.stage=0}this.data=LEVELS[this.level];this.path=this.data.path;this.pads=this.data.pads.map(p=>({...p}));this.waves=this.data.waves;if(this.mode==="endless_plus"){this.life=30;this.gold=200;this.inEndless=true}else{this.life=20+this.bonusLife;this.gold=120+this.bonusGold;if(this.mode==="hard"){this.life=Math.max(8,this.life-4);this.gold=Math.max(70,this.gold-20)}}this.wave=0;this.towers=[];this.enemies=[];this.projectiles=[];this.queue=[];this.waveActive=false;this.between=true;this.previewPad=null;this.selectedTower=null;this.placingPad=false;this.pendingPad=null}
 start(mode){this.mode=mode;this.metaGold=0;this.bonusLife=0;this.bonusGold=0;this.bonusDamage=0;this.score=0;this.timer=0;this.spawnT=0;this.scoreSubmitted=false;this.leaderboardOffset=0;this.level=0;this.inEndless=false;this.cycle=0;this.stage=0;this.reset(true);this.state="playing"}
 effect(x,y,msg,c=C.yellow){this.effects.push({x,y,msg,c,t:35})}
 updateEffects(){for(let e of this.effects){e.y-=1;e.t--}this.effects=this.effects.filter(e=>e.t>0)}
 drawEffects(){for(let e of this.effects)text(e.msg,e.x,e.y,20,e.c,"center")}
 validPadPosition(p){if(p.y<TOP+30||p.y>H-BOTTOM-30||p.x<35||p.x>W-35)return false;if(nearPath(p,this.path,60))return false;for(let pad of this.pads)if(dist(p,pad)<80)return false;return true}
 occupied(p){return this.towers.some(t=>t.x===p.x&&t.y===p.y)}
 towerAt(p){return [...this.towers].reverse().find(t=>dist(t,p)<=24)||null}
 padAt(p){return this.pads.find(pad=>dist(pad,p)<=26)||null}
 previewRange(){let r=TOWERS[this.selectedBuild].range;if(this.selectedBuild==="cannon"&&this.mode==="hard")r*=.96;return r}
 displayLevel(){if(this.mode==="endless_plus")return"Infini+";return this.inEndless?`${this.cycle}.${this.stage}`:String(this.level+1)}
 towerPenalty(){if(this.mode==="hard")return .78;if(!this.inEndless||this.mode==="endless_plus")return 1;return Math.max(.45,1-this.cycle*.04-(this.stage-1)*.015)}
 enemyMul(){if(!this.inEndless||this.mode==="endless_plus")return 1;return 1+this.cycle*.22+(this.stage-1)*.08}
 buildTower(p){let cost=TOWERS[this.selectedBuild].cost;if(this.gold<cost){this.effect(p.x,p.y,"Pas assez",C.red);return}this.gold-=cost;this.towers.push(new Tower(p.x,p.y,this.selectedBuild,(1+this.bonusDamage)*this.towerPenalty(),this.mode==="hard"));this.effect(p.x,p.y,"OK",C.green)}
 sellTower(){if(!this.selectedTower)return;let v=this.selectedTower.sellValue();this.gold+=v;this.effect(this.selectedTower.x,this.selectedTower.y,"+"+v,C.yellow);this.towers=this.towers.filter(t=>t!==this.selectedTower);this.selectedTower=null}
 startWave(){if(this.mode==="endless_plus")return;let max=this.inEndless?3:this.waves.length;if(this.wave>=max)return;this.queue=[];let data=this.inEndless?this.endlessWave(this.wave):this.waves[this.wave];for(let [type,n] of data)for(let i=0;i<n;i++)this.queue.push(type);this.queue.sort(()=>Math.random()-.5);this.waveActive=true;this.between=false;this.spawnT=0;this.selectedTower=null;this.previewPad=null}
 endlessWave(w){let s=this.cycle+this.stage;if(w===0)return[["grunt",10+s*2],["fast",6+s]];if(w===1)return[["tank",5+Math.floor(s/2)],["flying",8+s],["shield",5+Math.floor(s/2)]];return[["runner",10+s],["healer",4+Math.floor(s/2)],["boss",1+Math.floor(this.cycle/3)]]}
 spawn(type){let hp=this.enemyMul(),sp=1;if(this.mode==="hard"){hp*=1.1;sp*=1.04}this.enemies.push(new Enemy(type,this.path,hp,sp))}
 updateEndless(){this.timer++;let sec=this.timer/FPS,dif=1+sec/90;this.spawnT--;let delay=Math.max(12,Math.floor(70/dif));if(this.spawnT<=0){this.spawnT=delay;let pool=["grunt"];if(sec>30)pool.push("fast");if(sec>60)pool.push("tank");if(sec>90)pool.push("flying");if(sec>130)pool.push("shield");if(sec>170)pool.push("runner");if(sec>220)pool.push("healer");if(sec>300)pool.push("boss");let type=pool[Math.floor(Math.random()*pool.length)];this.enemies.push(new Enemy(type,this.path,dif,1+Math.min(.65,sec/900)))}}
 update(){this.updateEffects();if(this.state!=="playing")return;if(this.mode==="endless_plus")this.updateEndless();if(this.mode!=="endless_plus"&&this.waveActive){this.spawnT--;if(this.queue.length&&this.spawnT<=0){this.spawn(this.queue.shift());this.spawnT=18+Math.floor(Math.random()*17)}}for(let e of this.enemies)e.update(this.enemies);let leaked=0;for(let e of this.enemies)if(e.reached&&!e.dead){leaked+=e.type==="boss"?2:1;e.dead=true}this.life-=leaked;for(let t of this.towers)t.update(this.enemies,this.projectiles);for(let p of this.projectiles)p.update(this.enemies);for(let e of this.enemies)if(e.dead&&e.hp<=0){let r=e.reward;if(this.mode==="hard")r=Math.max(1,Math.floor(r*.9));if(this.inEndless&&this.mode!=="endless_plus")r=Math.max(1,Math.floor(r*.85));this.gold+=r;this.metaGold+=r;if(this.mode==="endless_plus")this.score+=r*10;e.hp=999999}this.enemies=this.enemies.filter(e=>!(e.dead&&e.hp>100000)&&!(e.dead&&e.reached));this.projectiles=this.projectiles.filter(p=>!p.dead);if(this.life<=0){this.state="game_over";return}if(this.mode==="endless_plus")return;let active=this.enemies.some(e=>!e.dead&&!e.reached);if(this.waveActive&&!this.queue.length&&!active){this.waveActive=false;this.between=true;this.wave++;let b=this.mode==="hard"?20:35;this.gold+=b;this.metaGold+=b}let max=this.inEndless?3:this.waves.length;if(this.wave>=max&&this.between&&!this.waveActive)this.state="level_complete"}
 nextLevel(){let r=this.mode==="hard"?35:65;if(this.inEndless)r=Math.floor(r*.75);this.metaGold+=r;if(!this.inEndless){this.level++;if(this.level>=LEVELS.length){this.inEndless=true;this.cycle=1;this.stage=1;this.level=0}}else{this.stage++;this.level++;if(this.level>=LEVELS.length){this.level=0;this.cycle++;this.stage=1}}this.reset(false);this.state="playing"}
 async addScore(){if(this.scoreSubmitted)return alert("Score déjà ajouté");let pseudo=prompt("Pseudo :","Paul");if(!pseudo)return;let pass=prompt("Mot de passe :");if(!pass)return;let res=await submitScore(pseudo,pass,this.score);if(!res.ok)return alert("Erreur : "+res.msg);this.scoreSubmitted=true;alert(res.msg)}
 click(p){if(this.state==="leaderboard"){
  if(inside(p,this.btnBackLeaderboard)){this.state="menu";return}
  if(inside(p,this.btnLeaderboardUp)){this.leaderboardOffset=Math.max(0,(this.leaderboardOffset||0)-10);return}
  if(inside(p,this.btnLeaderboardDown)){this.leaderboardOffset=Math.min(Math.max(0,leaderboard.length-10),(this.leaderboardOffset||0)+10);return}
  return
}
if(this.state==="menu"){if(inside(p,this.btnInfini))this.start("endless_plus");else if(inside(p,this.btnNormal))this.start("normal");else if(inside(p,this.btnHard))this.start("hard");else if(inside(p,this.btnRefresh))refreshLeaderboard();else if(inside(p,this.btnFullLeaderboard))this.state="leaderboard";return}
  if(this.state==="game_over"){if(inside(p,this.btnRestart))this.state="menu";if(this.mode==="endless_plus"&&inside(p,this.btnAddScore))this.addScore();if(inside(p,this.btnRefresh))refreshLeaderboard();return}
  if(this.state==="level_complete"){for(let item of this.metaRects)if(inside(p,item.r)){this.buyMeta(item.b);return}if(inside(p,this.btnNext))this.nextLevel();return}
  if(this.state!=="playing")return;
  if(this.placingPad){if(inside(p,this.btnCancelPad)){this.placingPad=false;this.pendingPad=null;return}if(inside(p,this.btnConfirmPad)){if(!this.pendingPad){this.effect(W/2,H-90,"Choisis un endroit",C.red);return}if(!this.validPadPosition(this.pendingPad)){this.effect(this.pendingPad.x,this.pendingPad.y,"Impossible",C.red);return}if(this.gold<NEW_PAD_COST){this.effect(W/2,H-90,"Pas assez d'or",C.red);return}this.gold-=NEW_PAD_COST;this.pads.push({x:this.pendingPad.x,y:this.pendingPad.y});this.effect(this.pendingPad.x,this.pendingPad.y,"Socle ajouté !",C.green);this.placingPad=false;this.pendingPad=null;return}if(p.y>TOP&&p.y<H-BOTTOM)this.pendingPad={x:p.x,y:p.y};return}
  if(inside(p,this.btnArcher)){this.selectedBuild="archer";this.selectedTower=null;return}if(inside(p,this.btnCannon)){this.selectedBuild="cannon";this.selectedTower=null;return}if(inside(p,this.btnTime)){this.selectedBuild="time";this.selectedTower=null;return}if(inside(p,this.btnTesla)){this.selectedBuild="tesla";this.selectedTower=null;return}if(inside(p,this.btnTitan)){this.selectedBuild="titan";this.selectedTower=null;return}
  if(inside(p,this.btnNewPad)){if(this.gold<NEW_PAD_COST){this.effect(W/2,H-90,"Pas assez d'or",C.red);return}this.placingPad=true;this.pendingPad=null;this.selectedTower=null;this.previewPad=null;return}
  if(inside(p,this.btnWave)&&this.between&&this.mode!=="endless_plus"){this.startWave();return}
  if(inside(p,this.btnUpgrade)&&this.selectedTower){let c=this.selectedTower.upgradeCost();if(c!==null&&this.gold>=c){this.gold-=c;this.selectedTower.upgrade();this.effect(this.selectedTower.x,this.selectedTower.y,"UP!",C.green)}return}
  if(inside(p,this.btnSell)&&this.selectedTower){this.sellTower();return}if(inside(p,this.btnSpec1)&&this.selectedTower){if(this.gold>=this.selectedTower.specCost()){this.gold-=this.selectedTower.specCost();this.selectedTower.specialize(1)}}if(inside(p,this.btnSpec2)&&this.selectedTower){if(this.gold>=this.selectedTower.specCost()){this.gold-=this.selectedTower.specCost();this.selectedTower.specialize(2)}}
  let t=this.towerAt(p);if(t){this.selectedTower=t;this.previewPad=null;return}let pad=this.padAt(p);if(pad&&!this.occupied(pad)){this.selectedTower=null;if(this.previewPad!==pad){this.previewPad=pad;return}this.buildTower(pad);this.previewPad=null;return}this.selectedTower=null;this.previewPad=null}
 buyMeta(b){if(this.metaGold<b.cost){this.effect(W/2,130,"Pas assez",C.red);return}this.metaGold-=b.cost;if(b.key==="life")this.bonusLife+=b.value;if(b.key==="gold")this.bonusGold+=b.value;if(b.key==="damage")this.bonusDamage+=b.value;this.effect(W/2,130,"Acheté",C.green)}
 drawBackground(){ctx.fillStyle=C.bg;ctx.fillRect(0,0,W,H);ctx.fillStyle=C.panel;ctx.fillRect(0,0,W,TOP);ctx.fillRect(0,H-BOTTOM,W,BOTTOM);ctx.strokeStyle=C.path;ctx.lineWidth=42;ctx.lineCap="round";ctx.lineJoin="round";ctx.beginPath();ctx.moveTo(this.path[0].x,this.path[0].y);for(let p of this.path.slice(1))ctx.lineTo(p.x,p.y);ctx.stroke();ctx.strokeStyle="#785a3c";ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(this.path[0].x,this.path[0].y);for(let p of this.path.slice(1))ctx.lineTo(p.x,p.y);ctx.stroke();for(let p of this.pads)circle(p.x,p.y,26,this.occupied(p)?C.dark:C.light,C.white,2);if(this.placingPad){ctx.save();ctx.globalAlpha=.18;ctx.fillStyle="red";ctx.fillRect(0,TOP,W,H-TOP-BOTTOM);ctx.fillStyle="lime";for(let x=40;x<W-40;x+=40)for(let y=TOP+40;y<H-BOTTOM-40;y+=40)if(this.validPadPosition({x,y}))ctx.fillRect(x-10,y-10,20,20);ctx.restore();if(this.pendingPad){let ok=this.validPadPosition(this.pendingPad);circle(this.pendingPad.x,this.pendingPad.y,28,ok?"rgba(0,255,0,.55)":"rgba(255,0,0,.55)",ok?C.green:C.red,3);text(ok?"OK":"NON",this.pendingPad.x,this.pendingPad.y+2,18,C.white,"center")}}if(this.previewPad){ctx.save();ctx.globalAlpha=.25;circle(this.previewPad.x,this.previewPad.y,this.previewRange(),C.white);ctx.restore();circle(this.previewPad.x,this.previewPad.y,this.previewRange(),null,C.white,2);circle(this.previewPad.x,this.previewPad.y,28,null,C.yellow,3)}}
 drawHud(){text(`Mode : ${this.mode.toUpperCase()}`,20,35,21);text(`Niveau : ${this.displayLevel()} - ${this.data.name}`,210,35,21);text(`Vie : ${this.life}`,560,35,21);text(`Or : ${this.gold}`,680,35,21,C.yellow);if(this.mode==="endless_plus"){text(`Score : ${this.score}`,810,35,21,C.cyan);text(`Temps : ${Math.floor(this.timer/FPS)}s`,970,35,21)}else{text(`Vague : ${this.wave}/${this.inEndless?3:this.waves.length}`,830,35,21)}this.btnWave=button(1040,15,145,40,this.mode==="endless_plus"?"Infini":(this.between?"Lancer":"En cours"),this.between?C.green:C.gray)}
 drawEntities(){for(let t of this.towers)t.draw(t===this.selectedTower);for(let p of this.projectiles)p.draw();for(let e of this.enemies)e.draw()}
 drawBottom(){let y=H-BOTTOM+12;if(this.placingPad){this.btnCancelPad=button(35,y+35,210,55,"Annuler",C.red);this.btnConfirmPad=button(275,y+35,210,55,"Valider",C.green);let msg=this.pendingPad?(this.validPadPosition(this.pendingPad)?"Emplacement valide : clique Valider":"Emplacement impossible"):"Clique sur la carte pour choisir";text(msg,530,y+62,22,this.pendingPad&&!this.validPadPosition(this.pendingPad)?C.red:C.white);rect(930,y+20,230,85,C.dark,C.white,14);text(`Prix : ${NEW_PAD_COST}`,945,y+45,18,C.yellow);text(`Gold : ${this.gold}`,945,y+74,18,C.white);return}
  this.btnArcher=button(20,y,145,40,"Archer",this.selectedBuild==="archer"?C.green:C.dark);this.btnCannon=button(175,y,145,40,"Canon",this.selectedBuild==="cannon"?C.orange:C.dark);this.btnTime=button(330,y,145,40,"Temps",this.selectedBuild==="time"?C.purple:C.dark);this.btnTesla=button(20,y+50,145,40,"Tesla",this.selectedBuild==="tesla"?C.cyan:C.dark);this.btnTitan=button(175,y+50,145,40,"Titan",this.selectedBuild==="titan"?C.red:C.dark);this.btnNewPad=button(330,y+50,145,40,"+ Socle",C.yellow);this.btnUpgrade=button(495,y,155,40,"Améliorer",this.selectedTower?C.purple:C.dark);this.btnSell=button(495,y+50,155,40,"Vendre",this.selectedTower?C.red:C.dark);let ok=this.selectedTower&&this.selectedTower.level>=4&&!this.selectedTower.spec;this.btnSpec1=button(665,y,145,40,"Spé 1",ok?C.cyan:C.dark);this.btnSpec2=button(665,y+50,145,40,"Spé 2",ok?C.cyan:C.dark);rect(830,y,350,115,C.dark,C.white,14);if(this.selectedTower){let t=this.selectedTower,up=t.upgradeCost(),sp=SPEC[t.type];text(`${t.label} niv ${t.level}/4`,845,y+16,18);text(`Dégâts ${Math.floor(t.damage)} | Portée ${Math.floor(t.range)}`,845,y+39,15);text(`Vente : ${t.sellValue()}`,845,y+60,15,C.yellow);text(up===null?`Spé : ${t.specCost()}`:`Upgrade : ${up}`,965,y+60,15,C.cyan);if(up===null&&!t.spec){text(`1 ${sp[0][0]}: ${sp[0][1]}`,845,y+82,12);text(`2 ${sp[1][0]}: ${sp[1][1]}`,845,y+100,12)}}else if(this.previewPad){let tw=TOWERS[this.selectedBuild],sp=SPEC[this.selectedBuild];text(`Preview : ${tw.label} (${tw.cost})`,845,y+17,18);text(`Portée : ${Math.floor(this.previewRange())}`,845,y+39,15,C.cyan);text(`Spé 1 ${sp[0][0]}: ${sp[0][1]}`,845,y+68,12);text(`Spé 2 ${sp[1][0]}: ${sp[1][1]}`,845,y+90,12)}else{text("1 clic socle = portée",845,y+25,18);text("2e clic = construire",845,y+50,15,C.cyan);text(`+ Socle : ${NEW_PAD_COST} gold`,845,y+76,14,C.yellow)}}
 drawLeaderboard(x,y,compact=false){
text("Leaderboard Infini+",x,y,compact?18:22,C.yellow,"center");

if(!leaderboardReady){
  text("Chargement...",x,y+30,16,C.light,"center");
  return;
}

if(!leaderboard.length){
  text("Aucun score pour l'instant",x,y+30,16,C.light,"center");
  return;
}

if(compact){
  const max=Math.min(15,leaderboard.length);
  const colW=230;
  const startX=x-colW;

  for(let i=0;i<max;i++){
    const col=Math.floor(i/5);
    const row=i%5;
    const e=leaderboard[i];
    const px=startX+col*colW;
    const py=y+32+row*24;
    text(`${i+1}. ${e.pseudo} - ${e.score}`,px,py,15,C.white,"center");
  }
  return;
}

for(let i=0;i<Math.min(leaderboard.length,10);i++){
  let e=leaderboard[i];
  text(`${i+1}. ${e.pseudo} - ${e.score}`,x,y+30+i*23,17,C.white,"center");
}
}
 
drawLeaderboardScreen(){
ctx.fillStyle="#1d2b44";
ctx.fillRect(0,0,W,H);
text("Leaderboard complet",W/2,70,42,C.yellow,"center");
text("Scores : "+leaderboard.length,W/2,105,18,C.cyan,"center");

rect(W/2-360,120,720,430,C.panel,C.white,16);

if(!leaderboardReady){
  text("Chargement...",W/2,180,24,C.white,"center");
}else if(!leaderboard.length){
  text("Aucun score",W/2,180,24,C.white,"center");
}else{
  const visibleCount=10;
  if(typeof this.leaderboardOffset!=="number" || Number.isNaN(this.leaderboardOffset)) this.leaderboardOffset=0;
  this.leaderboardOffset=Math.max(0,Math.min(this.leaderboardOffset,Math.max(0,leaderboard.length-visibleCount)));

  for(let i=0;i<visibleCount;i++){
    const idx=this.leaderboardOffset+i;
    if(idx>=leaderboard.length)break;

    const e=leaderboard[idx];
    const y=160+i*36;

    text("#"+(idx+1),W/2-285,y,22,C.yellow);
    text(e.pseudo||"Joueur",W/2-145,y,22,C.white);
    text(String(e.score),W/2+260,y,22,C.cyan,"right");
  }
}

this.btnLeaderboardUp=button(W/2+380,180,130,55,"Monter",C.dark);
this.btnLeaderboardDown=button(W/2+380,255,130,55,"Descendre",C.dark);
this.btnBackLeaderboard=button(W/2-160,625,320,60,"Retour menu",C.green);
}

drawMenu(){ctx.fillStyle="#285078";ctx.fillRect(0,0,W,H);text("Tower Defense",W/2,85,44,C.white,"center");this.btnInfini=button(W/2-220,175,440,85,"INFINI +",C.purple,28);this.btnNormal=button(W/2-220,285,205,58,"NORMAL",C.green);this.btnHard=button(W/2+15,285,205,58,"HARD",C.red);this.btnRefresh=button(W/2-145,385,290,45,"Rafraîchir leaderboard",C.dark);
this.btnFullLeaderboard=button(W/2-145,440,290,45,"Leaderboard complet",C.blue);
this.drawLeaderboard(W/2,515,true)}
 drawLevelComplete(){ctx.fillStyle="#1e3250";ctx.fillRect(0,0,W,H);text("Niveau terminé !",W/2,80,46,C.white,"center");text(`Or campagne : ${this.metaGold}`,W/2,140,24,C.yellow,"center");this.metaRects=[];let y=210;for(let b of META){let r={x:180,y,w:840,h:75};rect(r.x,r.y,r.w,r.h,C.panel,C.white,14);text(b.name,r.x+20,r.y+22,22);text(b.desc,r.x+20,r.y+52,17,C.light);text(`Coût : ${b.cost}`,r.x+r.w-150,r.y+38,22,C.yellow);this.metaRects.push({r,b});y+=95}this.btnNext=button(W/2-160,590,320,65,"Continuer",C.green);this.drawEffects()}
 drawGameOver(){this.drawBackground();this.drawEntities();this.drawHud();this.drawBottom();ctx.fillStyle="rgba(0,0,0,.65)";ctx.fillRect(0,0,W,H);text("Défaite",W/2,155,50,C.red,"center");if(this.mode==="endless_plus"){text(`Score final : ${this.score}`,W/2,220,32,C.yellow,"center");this.btnRefresh=button(W/2-145,535,290,45,"Rafraîchir leaderboard",C.dark);this.drawLeaderboard(W/2,275,false);this.btnRestart=button(W/2-315,610,280,60,"Retour menu",C.green);this.btnAddScore=button(W/2+35,610,280,60,this.scoreSubmitted?"Score ajouté":"Ajouter score",this.scoreSubmitted?C.gray:C.purple)}else{text(`Tu es arrivé au niveau : ${this.displayLevel()}`,W/2,260,32,C.white,"center");this.btnRestart=button(W/2-150,360,300,65,"Retour menu",C.green)}}
 drawPlaying(){this.drawBackground();this.drawEntities();this.drawHud();this.drawBottom();this.drawEffects()}
 draw(){if(this.state==="leaderboard")this.drawLeaderboardScreen();else if(this.state==="menu")this.drawMenu();else if(this.state==="playing")this.drawPlaying();else if(this.state==="level_complete")this.drawLevelComplete();else if(this.state==="game_over")this.drawGameOver()}
}

const game=new Game();refreshLeaderboard();

canvas.addEventListener("wheel",e=>{
  if(game.state==="leaderboard"){
    e.preventDefault();
    const maxOffset=Math.max(0,leaderboard.length-10);
    if(e.deltaY>0){
      game.leaderboardOffset=Math.min(maxOffset,(game.leaderboardOffset||0)+3);
    }else{
      game.leaderboardOffset=Math.max(0,(game.leaderboardOffset||0)-3);
    }
  }
},{passive:false});

canvas.addEventListener("click",e=>{let b=canvas.getBoundingClientRect();game.click({x:(e.clientX-b.left)*(canvas.width/b.width),y:(e.clientY-b.top)*(canvas.height/b.height)})});
function loop(){game.update();game.draw();requestAnimationFrame(loop)}
loop();
</script>
